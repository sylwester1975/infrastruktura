<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026 (PNG)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            text-align: center;
            font-family: sans-serif;
        }
        /* Pasek górny z przyciskiem po prawej */
        .top-bar {
            display: flex;
            justify-content: flex-end; /* Przycisk do prawej */
            align-items: center;
            padding: 10px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            position: sticky; /* Pasek zostaje na górze przy przewijaniu */
            top: 0;
            z-index: 1000;
        }
        .btn-download {
            padding: 6px 14px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #218838;
        }

        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: top;
            cursor: zoom-in;
            margin-top: 10px;
        }
        img.zoomed {
            max-width: none;
            display: block;
            margin: 0;
            cursor: zoom-out;
        }
    </style>
</head>
<body>

    <!-- Profesjonalny pasek narzędziowy dla wersji PNG -->
    <div class="top-bar">
        <a href="kdp-i-droga-s10-plock-2026.png" download="Mapa-S10-KDP-Plock.png" class="btn-download">
            Pobierz PNG
        </a>
    </div>

    <img src="kdp-i-droga-s10-plock-2026.png" 
         id="mapaS10" 
         onclick="toggleZoom()" 
         alt="Mapa infrastruktury KDP i drogi S10 w Płocku 2026 - Format PNG" 
         decoding="async">

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            if (img.classList.contains('zoomed')) {
                document.body.style.textAlign = 'left';
            } else {
                document.body.style.textAlign = 'center';
            }
        }
    </script>

</body>
</html>
