<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026 (PNG)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* Nowoczesny pasek górny */
        .top-bar {
            display: flex;
            justify-content: space-between; /* Tytuł po lewej, przycisk po prawej */
            align-items: center;
            padding: 12px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        /* Styl tytułu po lewej */
        .bar-title {
            font-size: 14px;
            color: #1a1a1a;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        /* Ciemny, profesjonalny przycisk */
        .btn-download {
            padding: 8px 16px;
            background-color: #24292e; /* Ciemny antracyt */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-download:hover {
            background-color: #444d56; /* Jaśniejszy szary po najechaniu */
        }

        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: top;
            cursor: zoom-in;
            margin-top: 20px;
        }
        img.zoomed {
            max-width: none;
            display: block;
            margin: 0;
            cursor: zoom-out;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <!-- Tytuł mapy po lewej -->
        <div class="bar-title">S10 i KDP Płock 2026</div>
        
        <!-- Ciemny przycisk pobierania po prawej -->
        <a href="kdp-i-droga-s10-plock-2026.png" download="Mapa-S10-KDP-Plock.png" class="btn-download">
            Pobierz mapę (PNG)
        </a>
    </div>

    <img src="kdp-i-droga-s10-plock-2026.png" 
         id="mapaS10" 
         onclick="toggleZoom()" 
         alt="Mapa infrastruktury KDP i drogi S10 w Płocku 2026 - Format PNG" 
         decoding="async">

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            if (img.classList.contains('zoomed')) {
                document.body.style.textAlign = 'left';
            } else {
                document.body.style.textAlign = 'center';
            }
        }
    </script>

</body>
</html>
