<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026 (PNG)</title>
    <style>
        :root {
            --bg-color: #f6f8fa;
            --text-dark: #24292e;
            --border-color: #d0d7de;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Pasek górny */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .file-info {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        /* Przyciski */
        .btn {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .btn-copy {
            background-color: #ffffff;
            color: var(--text-dark);
        }
        .btn-copy:hover {
            background-color: #f3f4f6;
        }

        .btn-download {
            background-color: #24292e;
            color: white;
            border: none;
        }
        .btn-download:hover {
            background-color: #444d56;
        }

        /* Przeglądarka mapy */
        .map-viewport {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: zoom-in;
            background: white;
            border-radius: 2px;
        }

        img.zoomed {
            max-width: none;
            cursor: zoom-out;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #24292e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="file-info">kdp-i-droga-s10-plock-2026.png</div>
        
        <div class="actions">
            <button class="btn btn-copy" onclick="copyLink()">
                🔗 Kopiuj link
            </button>
            
            <a href="kdp-i-droga-s10-plock-2026.png" 
               download="Mapa-S10-KDP-Plock-2026.png" 
               class="btn btn-download">
                Pobierz PNG
            </a>
        </div>
    </header>

    <main class="map-viewport">
        <img src="kdp-i-droga-s10-plock-2026.png" 
             id="mapaImg" 
             onclick="toggleZoom()" 
             alt="Mapa infrastruktury KDP i S10 Płock (PNG)">
    </main>

    <div id="toast">Link skopiowany do schowka!</div>

    <script>
        function toggleZoom() {
            document.getElementById('mapaImg').classList.toggle('zoomed');
        }

        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        }
    </script>

</body>
</html>
