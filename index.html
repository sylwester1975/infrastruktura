<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* Pasek górny - teraz z tytułem i przyciskami */
        .top-bar {
            display: flex;
            justify-content: space-between; /* Tytuł na lewo, przyciski na prawo */
            align-items: center;
            padding: 12px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .title {
            font-size: 14px;
            font-weight: 600;
            color: #24292e;
            margin: 0;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        /* Styl Twoich przycisków */
        .btn {
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            cursor: pointer;
            border: 1px solid #24292e;
        }

        .btn-copy {
            background-color: white;
            color: #24292e;
        }
        .btn-copy:hover {
            background-color: #f6f8fa;
        }

        .btn-download {
            background-color: #24292e;
            color: white;
        }
        .btn-download:hover {
            background-color: #444d56;
        }

        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: top;
            cursor: zoom-in;
            margin-top: 20px;
        }
        img.zoomed {
            max-width: none;
            display: block;
            margin: 0;
            cursor: zoom-out;
        }

        /* Prosty toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #24292e;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">Mapa S10 i KDP Płock 2026</div>
        <div class="button-group">
            <button onclick="copyLink()" class="btn btn-copy">Kopiuj link</button>
            <a href="kdp-i-droga-s10-plock-2026.webp" download="Mapa-S10-KDP-Plock.webp" class="btn btn-download">
                Pobierz (WEBP)
            </a>
        </div>
    </div>

    <img src="kdp-i-droga-s10-plock-2026.webp" 
         id="mapaS10" 
         onclick="toggleZoom()" 
         alt="Mapa infrastruktury KDP i drogi S10 w Płocku 2026" 
         decoding="async">

    <div id="toast">Link skopiowany!</div>

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            if (img.classList.contains('zoomed')) {
                document.body.style.textAlign = 'left';
            } else {
                document.body.style.textAlign = 'center';
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>

</body>
</html>
