DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP w regionie Płocka</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 0; /* Usuwa białą szczelinę pod obrazkiem */
        }

        /* Pasek górny */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
            line-height: normal; /* Przywraca normalny tekst w pasku */
        }
        
        .title {
            font-size: 14px;
            font-weight: 600;
            color: #24292e;
            margin: 0;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        /* Styl przycisków */
        .btn {
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            cursor: pointer;
            border: 1px solid #24292e;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy {
            background-color: white;
            color: #24292e;
        }
        .btn-copy:hover {
            background-color: #f6f8fa;
        }

        .btn-download {
            background-color: #24292e;
            color: white;
        }
        .btn-download:hover {
            background-color: #444d56;
        }

        /* Kontener i Obraz - Przyklejony do góry */
        .map-wrapper {
            text-align: center;
            width: 100%;
        }

        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            vertical-align: top;
            cursor: zoom-in;
            margin: 0; /* Brak marginesu - przyklejenie do góry */
        }

        img.zoomed {
            max-width: none;
            display: block; /* Wymusza start od lewej krawędzi (0,0) */
            margin: 0;
            cursor: zoom-out;
        }

        /* Responsywność */
        @media (max-width: 650px) {
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
                padding: 12px 16px;
                gap: 12px;
            }
            .button-group {
                width: 100%;
            }
            .btn {
                flex: 1;
                justify-content: center;
            }
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #24292e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            display: none;
            line-height: normal;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">Mapa S10 i KDP w regionie Płocka</div>
        <div class="button-group">
            <button onclick="copyLink()" class="btn btn-copy">
                <span>🔗</span> Kopiuj link
            </button>
            <a href="kdp-i-droga-s10-plock-2026.webp" download="Mapa-S10-KDP-Plock.webp" class="btn btn-download">
                Pobierz mapę (WEBP)
            </a>
        </div>
    </div>

    <div class="map-wrapper">
        <img src="kdp-i-droga-s10-plock-2026.webp" 
             id="mapaS10" 
             onclick="toggleZoom()" 
             alt="Mapa infrastruktury KDP i drogi S10 w regionie Płocka" 
             decoding="async">
    </div>

    <div id="toast">Link skopiowany do schowka!</div>

    <script>
        function toggleZoom() {
            const img = document.getElementById('mapaS10');
            img.classList.toggle('zoomed');
            
            // Jeśli nie jest powiększony, centrujemy w wrapperze (przez text-align: center)
            // Jeśli jest powiększony, display: block w CSS załatwia wyrównanie do lewej.
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>

</body>
</html>
