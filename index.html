<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-dark: #24292e;
            --border-color: #d0d7de;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .btn-copy { background: white; color: var(--text-dark); }
        .btn-download { background: #24292e; color: white; border: none; }

        /* KONTENER: Klucz do braku przycinania */
        .map-container {
            flex: 1;
            overflow: auto; /* Pojawią się paski przewijania, jeśli mapa będzie za duża */
            display: flex;
            justify-content: center; /* Centrowanie w pionie/poziomie, gdy mapa jest mała */
            align-items: center; 
            padding: 20px;
            scroll-behavior: smooth; /* Płynne przesuwanie do punktu kliknięcia */
        }

        img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: zoom-in;
            background: white;
            display: block;
        }

        /* POWIĘKSZENIE: Zmieniamy szerokość na sztywną dużą wartość */
        img.zoomed {
            max-width: 250%; /* Lub konkretna szerokość w px, np. 3000px */
            cursor: zoom-out;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #24292e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn btn-copy" onclick="copyToClipboard()">🔗 Kopiuj link</button>
        <a href="kdp-i-droga-s10-plock-2026.webp" download class="btn btn-download">Pobierz mapę</a>
    </div>

    <div class="map-container" id="scrollContainer">
        <img src="kdp-i-droga-s10-plock-2026.webp" id="mapaS10" onclick="toggleZoom(event)" alt="Mapa S10 KDP">
    </div>

    <div id="toast">Link skopiowany do schowka!</div>

    <script>
        function toggleZoom(event) {
            const img = document.getElementById('mapaS10');
            const container = document.getElementById('scrollContainer');
            
            if (!img.classList.contains('zoomed')) {
                // 1. Zapamiętujemy, gdzie kliknął użytkownik (procentowo)
                const rect = img.getBoundingClientRect();
                const offsetX = (event.clientX - rect.left) / rect.width;
                const offsetY = (event.clientY - rect.top) / rect.height;

                // 2. Powiększamy
                img.classList.add('zoomed');

                // 3. Przesuwamy scroll kontenera dokładnie w to miejsce (po krótkiej chwili na przeliczenie)
                setTimeout(() => {
                    container.scrollLeft = (img.offsetWidth * offsetX) - (container.offsetWidth / 2);
                    container.scrollTop = (img.offsetHeight * offsetY) - (container.offsetHeight / 2);
                }, 10);
            } else {
                img.classList.remove('zoomed');
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
