<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa S10 i KDP Płock 2026</title>
    <style>
        :root {
            --bg-main: #f6f8fa;
            --toolbar-bg: #ffffff;
            --text-main: #1f2328;
            --text-muted: #636c76;
            --border-color: #d0d7de;
            --accent: #24292e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Pasek górny - układ profesjonalny */
        .top-bar {
            display: flex;
            justify-content: space-between; /* Tytuł lewo, przyciski prawo */
            align-items: center;
            padding: 0 24px;
            height: 64px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .title-section {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Skraca tytuł na bardzo małych ekranach */
            margin-right: 20px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-shrink: 0; /* Przyciski nie będą się ściskać */
        }

        /* Stylizacja przycisków */
        .btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
        }

        .btn-copy {
            background-color: #ffffff;
            color: var(--text-main);
        }
        .btn-copy:hover {
            background-color: #f3f4f6;
        }

        .btn-download {
            background-color: var(--accent);
            color: white;
            border: none;
        }
        .btn-download:hover {
            background-color: #3f4448;
        }

        /* Obszar mapy */
        .viewer-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .map-frame {
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            cursor: zoom-in;
            background: white;
        }

        img.zoomed {
            max-width: none;
            cursor: zoom-out;
        }

        /* Powiadomienie (Toast) */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="title-section">
            Kolej Dużych Prędkości i droga ekspresowa S10 w regionie Płocka
        </div>
        
        <div class="actions">
            <button class="btn btn-copy" onclick="copyLink()">
                🔗 Kopiuj link
            </button>
            <a href="kdp-i-droga-s10-plock-2026.webp" 
               download="Mapa-S10-KDP-Plock.webp" 
               class="btn btn-download">
                Pobierz mapę (WEBP)
            </a>
        </div>
    </header>

    <main class="viewer-container">
        <div class="map-frame">
            <img src="kdp-i-droga-s10-plock-2026.webp" 
                 id="mapaS10" 
                 onclick="toggleZoom()" 
                 alt="Kolej Dużych Prędkości i droga ekspresowa S10 Płock 2026">
        </div>
    </main>

    <div id="toast">Link został skopiowany do schowka</div>

    <script>
        function toggleZoom() {
            document.getElementById('mapaS10').classList.toggle('zoomed');
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2500);
            });
        }
    </script>

</body>
</html>
